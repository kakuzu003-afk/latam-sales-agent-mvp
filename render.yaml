services:
  - type: web
    name: botbuilder-latam
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      - key: APP_SECRET
        generateValue: true
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      # Carpeta persistente: los datos viven en el disco y NO se borran al hacer deploy.
      - key: DATA_DIR
        value: /var/data
    # Disco persistente montado en /var/data (sobrevive deploys y reinicios).
    disk:
      name: botbuilder-data
      mountPath: /var/data
      sizeGB: 1
